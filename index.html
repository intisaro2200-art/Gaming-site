<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ModVault — Free Game Mods</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b12;
  --surface:#0f1219;
  --card:#111520;
  --border:rgba(255,255,255,0.06);
  --accent:#3b82f6;
  --accent2:#7c3aed;
  --text:#f1f5f9;
  --muted:#64748b;
  --maxw:1100px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Barlow',system-ui,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100vh;overflow-x:hidden;
}
body::before{
  content:'';position:fixed;inset:0;z-index:0;
  background-image:
    linear-gradient(rgba(59,130,246,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(59,130,246,0.03) 1px,transparent 1px);
  background-size:40px 40px;pointer-events:none;
}

/* HEADER */
header{
  position:sticky;top:0;z-index:50;
  background:rgba(8,11,18,0.92);
  backdrop-filter:blur(14px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.top{max-width:var(--maxw);margin:0 auto;display:flex;align-items:center;gap:12px}
.logo{
  font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;color:transparent;flex-shrink:0;
}
.search-wrap{flex:1;position:relative;max-width:500px}
.search-wrap input{
  width:100%;padding:10px 16px 10px 42px;border-radius:999px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-family:'Barlow',sans-serif;font-size:14px;outline:none;
  transition:border-color .18s;
}
.search-wrap input::placeholder{color:var(--muted)}
.search-wrap input:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px}
.ham-btn{
  display:none;width:40px;height:40px;border-radius:10px;
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);font-size:18px;cursor:pointer;
  align-items:center;justify-content:center;flex-shrink:0;
}

/* LAYOUT */
.wrap{
  max-width:var(--maxw);margin:24px auto;
  padding:0 16px 60px;
  display:grid;grid-template-columns:220px 1fr;gap:20px;
  position:relative;z-index:1;
}

/* SIDEBAR */
.sidebar{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:14px;
  height:fit-content;position:sticky;top:80px;
}
.sidebar-title{
  font-size:11px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;color:var(--muted);margin-bottom:12px;padding:0 4px;
}
.game-btn{
  width:100%;text-align:left;padding:9px 12px;border-radius:9px;
  border:none;background:none;color:var(--muted);
  font-family:'Barlow',sans-serif;font-size:14px;font-weight:600;
  cursor:pointer;margin-bottom:4px;transition:all .15s;
  display:flex;align-items:center;gap:8px;
}
.game-btn:hover{background:rgba(255,255,255,0.04);color:var(--text)}
.game-btn.active{background:rgba(59,130,246,0.12);color:var(--accent)}
.game-btn .dot{
  width:6px;height:6px;border-radius:50%;background:var(--accent);
  opacity:0;transition:opacity .15s;flex-shrink:0;
}
.game-btn.active .dot{opacity:1}

/* FEED */
.feed{display:grid;gap:16px}
.results-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.results-bar h2{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px}
.results-count{font-size:13px;color:var(--muted)}

/* CARD */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:16px;
  overflow:hidden;display:grid;grid-template-columns:200px 1fr;
  transition:border-color .2s,transform .2s,box-shadow .2s;
}
.card:hover{
  border-color:rgba(59,130,246,0.3);transform:translateY(-2px);
  box-shadow:0 12px 40px rgba(59,130,246,0.08);
}
.card-img-wrap{position:relative;overflow:hidden;height:200px;flex-shrink:0}
.card-img-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;transition:transform .3s}
.card:hover .card-img-wrap img{transform:scale(1.06)}
.card-tag{
  position:absolute;bottom:8px;left:8px;
  background:rgba(0,0,0,0.75);backdrop-filter:blur(6px);
  font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
  padding:3px 8px;border-radius:999px;
  color:var(--accent);border:1px solid rgba(59,130,246,0.2);
}
.card-body{padding:18px 20px;display:flex;flex-direction:column;gap:8px}
.card-game{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--accent)}
.card-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;line-height:1.1}
.card-desc{font-size:13px;color:var(--muted);line-height:1.6;flex:1}
.card-footer{display:flex;align-items:center;gap:10px;margin-top:4px;flex-wrap:wrap}
.dl-btn{
  display:inline-flex;align-items:center;gap:6px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;border:none;padding:9px 18px;border-radius:9px;
  font-family:'Barlow',sans-serif;font-weight:700;font-size:13px;
  cursor:pointer;text-decoration:none;transition:opacity .15s,transform .15s;
}
.dl-btn:hover{opacity:.88;transform:scale(1.02)}
.free-badge{
  font-size:11px;color:var(--muted);
  display:flex;align-items:center;gap:4px;
}

/* EMPTY */
#emptyState{display:none;text-align:center;padding:60px 20px;color:var(--muted)}

/* MOBILE DRAWER */
#drawer{
  position:fixed;left:-100%;top:0;bottom:0;width:260px;
  background:var(--surface);border-right:1px solid var(--border);
  padding:24px 16px;transition:left .22s ease;z-index:100;overflow-y:auto;
}
#drawer.open{left:0}
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(3px);opacity:0;pointer-events:none;
  transition:opacity .22s;z-index:90;
}
#overlay.open{opacity:1;pointer-events:auto}
.drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.drawer-logo{
  font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;color:transparent;
}
.drawer-x{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;width:32px;height:32px;display:grid;place-items:center}

@media(max-width:800px){
  .wrap{grid-template-columns:1fr}
  .sidebar{display:none}
  .ham-btn{display:flex}
  .card{grid-template-columns:1fr}
  .card-img-wrap{height:220px}
  .search-wrap{max-width:none}
}
@media(max-width:480px){
  .card-body{padding:14px}
  .card-title{font-size:18px}
}
</style>
</head>
<body>

<header>
  <div class="top">
    <div class="logo">ModVault</div>
    <div class="search-wrap">
      <span class="search-icon">🔎</span>
      <input id="searchInput" type="text" placeholder="Search games or mods...">
    </div>
    <button class="ham-btn" id="ham">☰</button>
  </div>
</header>

<div id="overlay"></div>
<aside id="drawer">
  <div class="drawer-head">
    <div class="drawer-logo">ModVault</div>
    <button class="drawer-x" id="drawerClose">✕</button>
  </div>
  <div class="sidebar-title">Games</div>
  <div id="mobileGameList"></div>
</aside>

<div class="wrap">
  <aside class="sidebar">
    <div class="sidebar-title">Games</div>
    <div id="desktopGameList"></div>
  </aside>

  <section>
    <div class="results-bar">
      <h2 id="feedTitle">ALL MODS</h2>
      <span class="results-count" id="resultsCount"></span>
    </div>
    <div class="feed" id="feed"></div>
    <div id="emptyState">
      <div style="font-size:40px;margin-bottom:12px">🎮</div>
      <p>No mods found. Try a different search.</p>
    </div>
  </section>
</div>

<script>
/* ======================================================
   🎮 MODS DATA — ONLY EDIT THIS PART!

   To ADD a new game:
   1. Copy one { block }
   2. Paste it before the final ];
   3. Fill in the fields

   Fields:
   - id       → unique short name, no spaces (e.g. "gta1")
   - game     → shown in sidebar (e.g. "GTA San Andreas")
   - title    → card headline
   - description → short description
   - image    → direct image URL
   - download → your OGADS content locker link
   ====================================================== */
const MODS = [
  {
    id: "gta1",
    game: "GTA San Andreas",
    title: "GTA San Andreas Mod Menu",
    description: "Play GTA San Andreas with mod menu, unlock features, spawn cars, fly, God mode.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/gta_san_andreas_apk_by_hot51mod_dii4ana-125s-2x.jpg",
    download: "https://redirectapps.org/cl/i/5ne7o1"
  },
  {
    id: "mc1",
    game: "Minecraft",
    title: "Minecraft Skins & Mods",
    description: "Get Minecraft best skins and mods for structure and graphics.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/minecraft-1639513933156.jpg",
    download: "https://applocked.org/cl/i/xp6jmv"
  },
  {
    id: "DLS",
    game: "Dream League Soccer",
    title: "Dream League Money Mod",
    description: "Play Dream League with infinite money and unlock upgrades and players.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/2025-12-02-17-04-56-60xiiOFbPnCXbWZ2fL_4Dx2aUkT8ojIqwNec_qmoTzOL52L_mVVFev_WD6AKekAI5YPa.jpg",
    download: "https://applocked.org/cl/i/n6d336"
  },
  {
    id: "truckers",
    game: "Truckers of Europe 3",
    title: "Truckers of Europe 3 Mods",
    description: "Get exclusive skins, new roads and radio stations.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/Untitled%20design_20251202_171332_0000.png",
    download: "https://lockedapp.org/cl/i/qnkrv6"
  },
  {
    id: "ark",
    game: "ARK Mobile",
    title: "ARK Skins & Mods",
    description: "Play ARK mobile with skins, mods, premium unlocked and more.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/2025-12-02-18-18-26-00fd8af896bab591d677f03939f07e7c.jpg",
    download: "https://lockedapp.org/cl/i/ex655m"
  },
  {
    id: "8ball",
    game: "8 Ball Pool",
    title: "8 Ball Pool Skins & Mods",
    description: "Unique cue skins, table skins, special modes and auto-aim assist.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/refs/heads/main/2025-12-02-18-46-35-696c8a24_41e9_4d07_8996_30f1bcbef5a4.jpg",
    download: "https://redirectapps.org/cl/i/5nkvek"
  },
  {
    id: "efootball",
    game: "eFootball",
    title: "eFootball Money Mod",
    description: "Faster progression, easier rewards and smoother gameplay all in one place.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/2025-12-02-21-32-06-main_page_1_sp.png",
    download: "https://redirectapps.org/cl/i/6nd86v"
  },
  {
    id: "parchisi",
    game: "Parchisi Star",
    title: "Parchisi Star Mod",
    description: "Premium experience from the start with billions of coins and gems.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/2025-12-02-22-51-12-aurUWpDZe7mDZ21v3lWlRd_p_ittowLWfL7Oo_ov6rhwnGIUG_xuF1sXBqDNZ8kWt20.jpg",
    download: "https://applocked.org/cl/i/qnkme6"
  },
  {
    id: "bitlife",
    game: "BitLife",
    title: "BitLife Mod — All Unlocked",
    description: "All features unlocked — Bitizenship, special jobs, run your own business, become whatever you want.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/Bitlife%20mod_20251202_224537_0000.png",
    download: "https://redirectapps.org/cl/i/7jdejv"
  },
  {
    id: "brawlstars",
    game: "Brawl Stars",
    title: "Brawl Stars Mod",
    description: "Unlock brawlers, collect resources and enjoy faster progression with a boosted start.",
    image: "https://raw.githubusercontent.com/intisaro2200-art/Gaming-site/main/2025-12-02-23-42-05-Brawl_Stars_Logo_2018_present.png",
    download: "https://redirectapps.org/cl/i/rn73dl"
  },
];
/* ====================================================== */

let activeGame = 'All';
const gameNames = ['All', ...new Set(MODS.map(m => m.game))];

function buildSidebar(id, mobile) {
  document.getElementById(id).innerHTML = gameNames.map(g => `
    <button class="game-btn ${g === activeGame ? 'active' : ''}"
      onclick="${mobile ? 'mobileFilter' : 'filterGame'}('${g.replace(/'/g,"\\'")}')">
      <span class="dot"></span>${g === 'All' ? '🎮 All Mods' : g}
    </button>
  `).join('');
}

function renderFeed(list) {
  const feed = document.getElementById('feed');
  const empty = document.getElementById('emptyState');
  document.getElementById('resultsCount').textContent = list.length ? `${list.length} mod${list.length > 1 ? 's' : ''}` : '';
  if (!list.length) { feed.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  feed.innerHTML = list.map(m => `
    <article class="card">
      <div class="card-img-wrap">
        <img src="${m.image}" alt="${m.title}" loading="lazy"
          onerror="this.src='https://via.placeholder.com/200x180/111520/64748b?text=Game'">
        <span class="card-tag">${m.game}</span>
      </div>
      <div class="card-body">
        <div class="card-game">${m.game}</div>
        <div class="card-title">${m.title}</div>
        <p class="card-desc">${m.description}</p>
        <div class="card-footer">
          <a class="dl-btn" href="${m.download}" target="_blank" rel="noopener">⬇ Free Download</a>
          <span class="free-badge">🔓 Unlocked</span>
        </div>
      </div>
    </article>
  `).join('');
}

function setActive(game) {
  activeGame = game;
  document.getElementById('feedTitle').textContent = game === 'All' ? 'ALL MODS' : game.toUpperCase();
  buildSidebar('desktopGameList', false);
  buildSidebar('mobileGameList', true);
}

function filterGame(game) {
  setActive(game);
  renderFeed(game === 'All' ? MODS : MODS.filter(m => m.game === game));
}

function mobileFilter(game) { filterGame(game); closeDrawer(); }

document.getElementById('searchInput').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  setActive('All');
  renderFeed(!q ? MODS : MODS.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.description.toLowerCase().includes(q) ||
    m.game.toLowerCase().includes(q)
  ));
});

document.getElementById('ham').onclick = () => {
  document.getElementById('drawer').classList.add('open');
  document.getElementById('overlay').classList.add('open');
};
function closeDrawer() {
  document.getElementById('drawer').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
document.getElementById('overlay').onclick = closeDrawer;
document.getElementById('drawerClose').onclick = closeDrawer;

buildSidebar('desktopGameList', false);
buildSidebar('mobileGameList', true);
renderFeed(MODS);
</script>
</body>
</html>
